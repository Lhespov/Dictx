<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f1117" />
<meta name="color-scheme" content="dark" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Dictx" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="format-detection" content="telephone=no" />
<meta name="description" content="Download a dictionary and extract words starting with a letter or prefix." />
<title>Dictx — extract words by prefix</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #181b24;
    --panel-2: #1f2430;
    --border: #2a3040;
    --text: #e6e9ef;
    --muted: #8b93a7;
    --accent: #6c8cff;
    --accent-2: #4f6fef;
    --good: #4ade80;
    --bad: #f87171;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  header {
    padding: 28px 20px 16px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0; font-size: 28px; letter-spacing: -0.5px; }
  header h1 .x { color: var(--accent); }
  header p { margin: 6px 0 0; color: var(--muted); font-size: 14px; }
  main { max-width: 860px; margin: 0 auto; padding: 20px; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 18px;
  }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .row > .field { flex: 1; min-width: 140px; }
  input[type="text"], input[type="number"], select {
    width: 100%;
    padding: 13px 14px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 16px; /* >=16px keeps iOS Safari from zooming on focus */
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }
  select { cursor: pointer; }
  input[type="text"]:focus, input[type="number"]:focus, select:focus { border-color: var(--accent); }
  .prefix-input { font-size: 18px; letter-spacing: 1px; }
  .checks { display: flex; gap: 18px; flex-wrap: wrap; align-items: center; margin-top: 14px; }
  .checks label { display: flex; align-items: center; gap: 8px; margin: 0; color: var(--text); font-size: 14px; cursor: pointer; }
  .actions { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
  button {
    padding: 13px 20px;
    min-height: 48px; /* comfortable touch target */
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, opacity .15s;
    touch-action: manipulation;
  }
  button.primary { background: var(--accent-2); color: #fff; }
  button.primary:hover { background: var(--accent); }
  button.ghost { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
  button.ghost:hover { border-color: var(--accent); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .status { margin-top: 14px; font-size: 13px; color: var(--muted); min-height: 18px; }
  .status.error { color: var(--bad); }
  .status.ok { color: var(--good); }
  .summary { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .summary .count { font-size: 15px; }
  .summary .count b { color: var(--accent); font-size: 20px; }
  .results {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px;
    max-height: 440px;
    overflow: auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 2px 14px;
  }
  .results .word { padding: 4px 8px; font-size: 14px; border-radius: 6px; }
  .results .word:hover { background: var(--panel); }
  .results .word b { color: var(--accent); }
  .empty { color: var(--muted); padding: 20px; text-align: center; }
  .bar {
    height: 6px; background: var(--panel-2); border-radius: 4px; overflow: hidden; margin-top: 10px; display: none;
  }
  .bar > div { height: 100%; width: 0; background: var(--accent); transition: width .2s; }
  footer { text-align: center; color: var(--muted); font-size: 12px; padding: 10px 20px 30px; }
  code { background: var(--panel-2); padding: 1px 6px; border-radius: 5px; font-size: 13px; }

  @media (max-width: 600px) {
    header { padding: 22px 16px 14px; }
    header h1 { font-size: 24px; }
    main { padding: 14px; }
    .card { padding: 16px; border-radius: 12px; margin-bottom: 14px; }
    .actions { gap: 10px; }
    /* Primary button full width, secondary actions share a row */
    .actions button.primary { flex: 1 1 100%; }
    .actions button.ghost { flex: 1 1 0; }
    .results {
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      max-height: 60vh;
    }
    .results .word { padding: 8px; } /* taller rows = easier to tap */
  }
  @media (hover: none) {
    .results .word:active { background: var(--panel); }
  }
</style>
</head>
<body>
<header>
  <h1>Dict<span class="x">x</span></h1>
  <p>Download a dictionary and extract every word starting with a letter or prefix.</p>
</header>

<main>
  <div class="card">
    <div class="field">
      <label for="prefix">Prefix(es) — separate multiple with spaces or commas</label>
      <input id="prefix" class="prefix-input" type="text" placeholder="e.g.  qu   or   pre, anti"
             autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
             enterkeyhint="search" />
    </div>

    <div class="row" style="margin-top:14px">
      <div class="field">
        <label for="sort">Sort results by</label>
        <select id="sort">
          <option value="alpha">Alphabetical (A–Z)</option>
          <option value="freq">Most common first</option>
        </select>
      </div>
      <div class="field">
        <label for="limit">Max results (0 = no limit)</label>
        <input id="limit" type="number" min="0" value="500" inputmode="numeric" />
      </div>
    </div>

    <div class="checks">
      <label><input id="caseSensitive" type="checkbox" /> Case-sensitive</label>
    </div>

    <div class="actions">
      <button id="searchBtn" class="primary">Extract words</button>
      <button id="copyBtn" class="ghost" disabled>Copy</button>
      <button id="downloadBtn" class="ghost" disabled>Download .txt</button>
    </div>

    <div class="bar" id="bar"><div></div></div>
    <div class="status" id="status"></div>
  </div>

  <div class="card" id="resultsCard" style="display:none">
    <div class="summary">
      <div class="count">Matches: <b id="count">0</b></div>
      <div class="count" id="shownNote" style="color:var(--muted);font-size:13px"></div>
    </div>
    <div class="results" id="results"></div>
  </div>
</main>

<footer>
  Word list: <a href="https://github.com/dwyl/english-words" style="color:var(--accent)">dwyl/english-words</a> (~370k words).
  Frequency order from <a href="https://github.com/arstgit/high-frequency-vocabulary" style="color:var(--accent)">high-frequency-vocabulary</a> (top 30k). Loaded once and cached in your browser.
</footer>

<script>
const DICT_URL = "https://raw.githubusercontent.com/dwyl/english-words/master/words_alpha.txt";
// 30k most common English words, ordered by usage frequency (line 0 = most common).
const FREQ_URL = "https://raw.githubusercontent.com/arstgit/high-frequency-vocabulary/master/30k.txt";

const $ = (id) => document.getElementById(id);
const statusEl = $("status");
const bar = $("bar");
const barFill = bar.firstElementChild;

let WORDS = null;          // array of all words, cached for the session
let FREQ_RANK = null;      // Map<lowercase word, rank>; lower rank = more common
let lastMatches = [];      // most recent result set (for copy/download)

function setStatus(msg, kind = "") {
  statusEl.textContent = msg;
  statusEl.className = "status" + (kind ? " " + kind : "");
}

// Fetch the word list once, with a streaming progress bar, then cache in memory.
async function loadWords() {
  if (WORDS) return WORDS;
  setStatus("Downloading dictionary…");
  bar.style.display = "block";
  barFill.style.width = "0%";

  const resp = await fetch(DICT_URL);
  if (!resp.ok) throw new Error("HTTP " + resp.status);

  const total = +resp.headers.get("content-length") || 0;
  const reader = resp.body.getReader();
  const chunks = [];
  let received = 0;
  for (;;) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
    received += value.length;
    if (total) barFill.style.width = Math.round((received / total) * 100) + "%";
  }
  const all = new Uint8Array(received);
  let offset = 0;
  for (const c of chunks) { all.set(c, offset); offset += c.length; }
  const text = new TextDecoder("utf-8").decode(all);

  WORDS = text.split(/\r?\n/).filter(Boolean);
  bar.style.display = "none";
  setStatus(`Dictionary ready — ${WORDS.length.toLocaleString()} words loaded.`, "ok");
  return WORDS;
}

// Load the frequency list once and build a word -> rank map (lazy: only needed
// for "Most common first" sorting). It's small (~265 KB) so no progress bar.
async function loadFreq() {
  if (FREQ_RANK) return FREQ_RANK;
  setStatus("Loading word-frequency data…");
  const resp = await fetch(FREQ_URL);
  if (!resp.ok) throw new Error("frequency list HTTP " + resp.status);
  const lines = (await resp.text()).split(/\r?\n/);
  FREQ_RANK = new Map();
  let rank = 0;
  for (const line of lines) {
    const w = line.trim().toLowerCase();
    if (w && !FREQ_RANK.has(w)) FREQ_RANK.set(w, rank++);
  }
  return FREQ_RANK;
}

// Sort matches in place by the chosen order.
//  - "alpha": case-insensitive A–Z.
//  - "freq":  most common first; words absent from the frequency list are
//             treated as rarest and ordered alphabetically after the ranked ones.
function sortMatches(matches, mode) {
  if (mode === "freq") {
    const rankOf = (w) => {
      const r = FREQ_RANK.get(w.toLowerCase());
      return r === undefined ? Infinity : r;
    };
    matches.sort((a, b) => {
      const ra = rankOf(a), rb = rankOf(b);
      if (ra !== rb) return ra - rb;
      return a.localeCompare(b); // tie-break (incl. all unranked) alphabetically
    });
  } else {
    matches.sort((a, b) => a.localeCompare(b));
  }
}

function parsePrefixes(raw) {
  return raw.split(/[\s,]+/).map((s) => s.trim()).filter(Boolean);
}

function escapeHtml(s) {
  return s.replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
}

async function search() {
  const raw = $("prefix").value;
  const prefixes = parsePrefixes(raw);
  if (prefixes.length === 0) {
    setStatus("Enter at least one prefix.", "error");
    return;
  }
  const caseSensitive = $("caseSensitive").checked;
  const limit = Math.max(0, parseInt($("limit").value, 10) || 0);
  const sortMode = $("sort").value;

  $("searchBtn").disabled = true;
  try {
    const words = await loadWords();
    if (sortMode === "freq") await loadFreq();

    const needles = caseSensitive ? prefixes : prefixes.map((p) => p.toLowerCase());
    const matches = [];
    for (let i = 0; i < words.length; i++) {
      const w = words[i];
      const cmp = caseSensitive ? w : w.toLowerCase();
      for (let j = 0; j < needles.length; j++) {
        if (cmp.startsWith(needles[j])) { matches.push(w); break; }
      }
    }

    sortMatches(matches, sortMode);
    lastMatches = matches;
    render(matches, prefixes, caseSensitive, limit);
    const order = sortMode === "freq" ? "most common first" : "A–Z";
    setStatus(`Found ${matches.length.toLocaleString()} match(es) for ${prefixes.map((p) => '"' + p + '"').join(", ")} (${order}).`, "ok");
  } catch (err) {
    bar.style.display = "none";
    setStatus("Failed to load dictionary: " + err.message, "error");
  } finally {
    $("searchBtn").disabled = false;
  }
}

function render(matches, prefixes, caseSensitive, limit) {
  $("resultsCard").style.display = "block";
  $("count").textContent = matches.length.toLocaleString();

  const shown = limit > 0 ? matches.slice(0, limit) : matches;
  $("shownNote").textContent =
    limit > 0 && matches.length > limit ? `showing first ${shown.length.toLocaleString()}` : "";

  const container = $("results");
  if (shown.length === 0) {
    container.innerHTML = '<div class="empty">No words match that prefix.</div>';
  } else {
    const lens = (caseSensitive ? prefixes : prefixes.map((p) => p.toLowerCase()));
    container.innerHTML = shown.map((w) => {
      const cmp = caseSensitive ? w : w.toLowerCase();
      let plen = 0;
      for (const n of lens) { if (cmp.startsWith(n)) { plen = n.length; break; } }
      return `<div class="word"><b>${escapeHtml(w.slice(0, plen))}</b>${escapeHtml(w.slice(plen))}</div>`;
    }).join("");
  }

  const has = matches.length > 0;
  $("copyBtn").disabled = !has;
  $("downloadBtn").disabled = !has;
}

$("searchBtn").addEventListener("click", search);
$("prefix").addEventListener("keydown", (e) => { if (e.key === "Enter") search(); });
// Re-sort instantly when the order changes (only if a search has run).
$("sort").addEventListener("change", () => { if ($("prefix").value.trim()) search(); });

$("copyBtn").addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(lastMatches.join("\n"));
    setStatus(`Copied ${lastMatches.length.toLocaleString()} word(s) to clipboard.`, "ok");
  } catch {
    setStatus("Clipboard not available in this context.", "error");
  }
});

$("downloadBtn").addEventListener("click", () => {
  const blob = new Blob([lastMatches.join("\n") + "\n"], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const name = parsePrefixes($("prefix").value).join("-") || "words";
  a.href = url;
  a.download = `dictx-${name}.txt`;
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
