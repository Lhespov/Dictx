<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dictx — extract words by prefix</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #181b24;
    --panel-2: #1f2430;
    --border: #2a3040;
    --text: #e6e9ef;
    --muted: #8b93a7;
    --accent: #6c8cff;
    --accent-2: #4f6fef;
    --good: #4ade80;
    --bad: #f87171;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  header {
    padding: 28px 20px 16px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0; font-size: 28px; letter-spacing: -0.5px; }
  header h1 .x { color: var(--accent); }
  header p { margin: 6px 0 0; color: var(--muted); font-size: 14px; }
  main { max-width: 860px; margin: 0 auto; padding: 20px; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 18px;
  }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .row > .field { flex: 1; min-width: 140px; }
  input[type="text"], input[type="number"] {
    width: 100%;
    padding: 12px 14px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    outline: none;
  }
  input[type="text"]:focus, input[type="number"]:focus { border-color: var(--accent); }
  .prefix-input { font-size: 18px; letter-spacing: 1px; }
  .checks { display: flex; gap: 18px; flex-wrap: wrap; align-items: center; margin-top: 14px; }
  .checks label { display: flex; align-items: center; gap: 8px; margin: 0; color: var(--text); font-size: 14px; cursor: pointer; }
  .actions { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
  button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, opacity .15s;
  }
  button.primary { background: var(--accent-2); color: #fff; }
  button.primary:hover { background: var(--accent); }
  button.ghost { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
  button.ghost:hover { border-color: var(--accent); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .status { margin-top: 14px; font-size: 13px; color: var(--muted); min-height: 18px; }
  .status.error { color: var(--bad); }
  .status.ok { color: var(--good); }
  .summary { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .summary .count { font-size: 15px; }
  .summary .count b { color: var(--accent); font-size: 20px; }
  .results {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px;
    max-height: 440px;
    overflow: auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 2px 14px;
  }
  .results .word { padding: 4px 8px; font-size: 14px; border-radius: 6px; }
  .results .word:hover { background: var(--panel); }
  .results .word b { color: var(--accent); }
  .empty { color: var(--muted); padding: 20px; text-align: center; }
  .bar {
    height: 6px; background: var(--panel-2); border-radius: 4px; overflow: hidden; margin-top: 10px; display: none;
  }
  .bar > div { height: 100%; width: 0; background: var(--accent); transition: width .2s; }
  footer { text-align: center; color: var(--muted); font-size: 12px; padding: 10px 20px 30px; }
  code { background: var(--panel-2); padding: 1px 6px; border-radius: 5px; font-size: 13px; }
</style>
</head>
<body>
<header>
  <h1>Dict<span class="x">x</span></h1>
  <p>Download a dictionary and extract every word starting with a letter or prefix.</p>
</header>

<main>
  <div class="card">
    <div class="field">
      <label for="prefix">Prefix(es) — separate multiple with spaces or commas</label>
      <input id="prefix" class="prefix-input" type="text" placeholder="e.g.  qu   or   pre, anti" autocomplete="off" />
    </div>

    <div class="row" style="margin-top:14px">
      <div class="field">
        <label for="limit">Max results (0 = no limit)</label>
        <input id="limit" type="number" min="0" value="500" />
      </div>
    </div>

    <div class="checks">
      <label><input id="caseSensitive" type="checkbox" /> Case-sensitive</label>
    </div>

    <div class="actions">
      <button id="searchBtn" class="primary">Extract words</button>
      <button id="copyBtn" class="ghost" disabled>Copy</button>
      <button id="downloadBtn" class="ghost" disabled>Download .txt</button>
    </div>

    <div class="bar" id="bar"><div></div></div>
    <div class="status" id="status"></div>
  </div>

  <div class="card" id="resultsCard" style="display:none">
    <div class="summary">
      <div class="count">Matches: <b id="count">0</b></div>
      <div class="count" id="shownNote" style="color:var(--muted);font-size:13px"></div>
    </div>
    <div class="results" id="results"></div>
  </div>
</main>

<footer>
  Word list: public-domain <a href="https://github.com/dwyl/english-words" style="color:var(--accent)">dwyl/english-words</a> (~370k words), loaded once and cached in your browser.
</footer>

<script>
const DICT_URL = "https://raw.githubusercontent.com/dwyl/english-words/master/words_alpha.txt";

const $ = (id) => document.getElementById(id);
const statusEl = $("status");
const bar = $("bar");
const barFill = bar.firstElementChild;

let WORDS = null;          // array of all words, cached for the session
let lastMatches = [];      // most recent result set (for copy/download)

function setStatus(msg, kind = "") {
  statusEl.textContent = msg;
  statusEl.className = "status" + (kind ? " " + kind : "");
}

// Fetch the word list once, with a streaming progress bar, then cache in memory.
async function loadWords() {
  if (WORDS) return WORDS;
  setStatus("Downloading dictionary…");
  bar.style.display = "block";
  barFill.style.width = "0%";

  const resp = await fetch(DICT_URL);
  if (!resp.ok) throw new Error("HTTP " + resp.status);

  const total = +resp.headers.get("content-length") || 0;
  const reader = resp.body.getReader();
  const chunks = [];
  let received = 0;
  for (;;) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
    received += value.length;
    if (total) barFill.style.width = Math.round((received / total) * 100) + "%";
  }
  const all = new Uint8Array(received);
  let offset = 0;
  for (const c of chunks) { all.set(c, offset); offset += c.length; }
  const text = new TextDecoder("utf-8").decode(all);

  WORDS = text.split(/\r?\n/).filter(Boolean);
  bar.style.display = "none";
  setStatus(`Dictionary ready — ${WORDS.length.toLocaleString()} words loaded.`, "ok");
  return WORDS;
}

function parsePrefixes(raw) {
  return raw.split(/[\s,]+/).map((s) => s.trim()).filter(Boolean);
}

function escapeHtml(s) {
  return s.replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
}

async function search() {
  const raw = $("prefix").value;
  const prefixes = parsePrefixes(raw);
  if (prefixes.length === 0) {
    setStatus("Enter at least one prefix.", "error");
    return;
  }
  const caseSensitive = $("caseSensitive").checked;
  const limit = Math.max(0, parseInt($("limit").value, 10) || 0);

  $("searchBtn").disabled = true;
  try {
    const words = await loadWords();

    const needles = caseSensitive ? prefixes : prefixes.map((p) => p.toLowerCase());
    const matches = [];
    for (let i = 0; i < words.length; i++) {
      const w = words[i];
      const cmp = caseSensitive ? w : w.toLowerCase();
      for (let j = 0; j < needles.length; j++) {
        if (cmp.startsWith(needles[j])) { matches.push(w); break; }
      }
    }

    lastMatches = matches;
    render(matches, prefixes, caseSensitive, limit);
    setStatus(`Found ${matches.length.toLocaleString()} match(es) for ${prefixes.map((p) => '"' + p + '"').join(", ")}.`, "ok");
  } catch (err) {
    bar.style.display = "none";
    setStatus("Failed to load dictionary: " + err.message, "error");
  } finally {
    $("searchBtn").disabled = false;
  }
}

function render(matches, prefixes, caseSensitive, limit) {
  $("resultsCard").style.display = "block";
  $("count").textContent = matches.length.toLocaleString();

  const shown = limit > 0 ? matches.slice(0, limit) : matches;
  $("shownNote").textContent =
    limit > 0 && matches.length > limit ? `showing first ${shown.length.toLocaleString()}` : "";

  const container = $("results");
  if (shown.length === 0) {
    container.innerHTML = '<div class="empty">No words match that prefix.</div>';
  } else {
    const lens = (caseSensitive ? prefixes : prefixes.map((p) => p.toLowerCase()));
    container.innerHTML = shown.map((w) => {
      const cmp = caseSensitive ? w : w.toLowerCase();
      let plen = 0;
      for (const n of lens) { if (cmp.startsWith(n)) { plen = n.length; break; } }
      return `<div class="word"><b>${escapeHtml(w.slice(0, plen))}</b>${escapeHtml(w.slice(plen))}</div>`;
    }).join("");
  }

  const has = matches.length > 0;
  $("copyBtn").disabled = !has;
  $("downloadBtn").disabled = !has;
}

$("searchBtn").addEventListener("click", search);
$("prefix").addEventListener("keydown", (e) => { if (e.key === "Enter") search(); });

$("copyBtn").addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(lastMatches.join("\n"));
    setStatus(`Copied ${lastMatches.length.toLocaleString()} word(s) to clipboard.`, "ok");
  } catch {
    setStatus("Clipboard not available in this context.", "error");
  }
});

$("downloadBtn").addEventListener("click", () => {
  const blob = new Blob([lastMatches.join("\n") + "\n"], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const name = parsePrefixes($("prefix").value).join("-") || "words";
  a.href = url;
  a.download = `dictx-${name}.txt`;
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
